name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install frontend dependencies
        run: npm install

      - name: Get changelog
        id: get_changelog
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Extracting changelog for version $VERSION..."
          CHANGELOG_TEXT=$(awk -v ver="$VERSION" '/^## / { if (p) { exit } if ($0 ~ "\\[" ver "\\]" || $0 ~ ver) { p = 1; next } } p { print }' CHANGELOG.md)
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG_TEXT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        id: tauri_build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'ReplyNow Config GUI v__VERSION__'
          releaseBody: ${{ steps.get_changelog.outputs.body }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Package portable binary (Windows only)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          EXE_PATH=$(find src-tauri/target/release -maxdepth 1 -name "*.exe" | head -n 1)
          if [ -n "$EXE_PATH" ]; then
            echo "Found executable at $EXE_PATH"
            cp "$EXE_PATH" ./replynow-config.exe
            7z a ./replynow-config-windows-portable.zip ./replynow-config.exe
          else
            echo "Error: Could not find any .exe file in src-tauri/target/release/"
            exit 1
          fi

      - name: Upload portable binary (Windows only)
        if: matrix.platform == 'windows-latest'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.tauri_build.outputs.appVersion }}"
          echo "Uploading portable assets to release tag v$VERSION..."
          gh release upload "v$VERSION" ./replynow-config.exe ./replynow-config-windows-portable.zip --clobber
