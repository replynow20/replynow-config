name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install frontend dependencies
        run: npm install

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        id: tauri_build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'ReplyNow Config GUI v__VERSION__'
          releaseBody: |
            ### ✨ 核心特性与修复 (Changelog)
            
            #### 1. 🚀 引导初始化环境优化
            * 弃用静默初始化，在未检测到 Codex 配置时提供**可点击状态栏和警告 Banner**。
            * 弹出全新的 **Step-by-Step 引导弹窗**，指引用户下载安装 **Codex 桌面客户端**并登录。
            * 整合 `@tauri-apps/plugin-opener` 插件，安全地在用户的默认系统浏览器中打开下载网页。
            * 提供“极速初始化”选项，支持绕过客户端直接在本地创建默认占位配置。
            
            #### 2. ⚙️ 配置文件合并与切换逻辑修复
            * 修复了 Rust 后端在保存时无法强制将根节点 `model_provider` 切换为 `"replynow"` 的问题。
            * 确保 `[model_providers.replynow]` 作为一个独立的 provider 节点能独立完整补全所有关键项（`name`、`base_url`、`env_key`、`wire_api`、`requires_openai_auth`），不会因其他子表（如 `custom`）的存在而发生写出字段缺失。
            
            #### 3. 🎨 “零滚动条”界面优化
            * 深度优化了客户端窗口的全局间距、内边距与反馈面板高度限制，确保基本视图下所有组件在一页中完全呈现，不触发任何纵向滚动条。
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Package portable binary (Windows only)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          EXE_PATH=$(find src-tauri/target/release -maxdepth 1 -name "*.exe" | head -n 1)
          if [ -n "$EXE_PATH" ]; then
            echo "Found executable at $EXE_PATH"
            cp "$EXE_PATH" ./replynow-config.exe
            7z a ./replynow-config-windows-portable.zip ./replynow-config.exe
          else
            echo "Error: Could not find any .exe file in src-tauri/target/release/"
            exit 1
          fi

      - name: Upload portable binary (Windows only)
        if: matrix.platform == 'windows-latest'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.tauri_build.outputs.appVersion }}"
          echo "Uploading portable assets to release tag v$VERSION..."
          gh release upload "v$VERSION" ./replynow-config.exe ./replynow-config-windows-portable.zip --clobber
