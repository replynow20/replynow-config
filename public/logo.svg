<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Premium Gradients -->
    <linearGradient id="logo-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <radialGradient id="star-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="25%" stop-color="#06b6d4" stop-opacity="0.8" />
      <stop offset="60%" stop-color="#6366f1" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0" />
    </radialGradient>
    <filter id="subtle-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#06b6d4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Optional Background (matching the app theme) -->
  <rect width="100" height="100" rx="22" fill="#12131a" />

  <!-- Stylized "Ar/Ai" path -->
  <g filter="url(#subtle-glow)">
    <!-- Main letter stroke (Loop of A) -->
    <path d="M 20,55 
             C 12,48 20,38 32,38 
             C 45,38 52,50 56,64 
             C 59,74 65,80 72,76 
             C 78,72 80,62 76,55" 
          fill="none" 
          stroke="url(#logo-grad)" 
          stroke-width="7" 
          stroke-linecap="round" 
          stroke-linejoin="round" />

    <!-- Crossover stroke from left to top right (the cross of A and the tail pointing to the star) -->
    <path d="M 12,50 
             C 25,36 45,46 58,40 
             C 68,34 76,24 82,18" 
          fill="none" 
          stroke="url(#logo-grad)" 
          stroke-width="7" 
          stroke-linecap="round" />

    <!-- The second letter stroke ("i" shape on the right) -->
    <path d="M 64,52 
             C 62,60 64,72 70,72 
             C 76,72 80,64 84,60" 
          fill="none" 
          stroke="url(#logo-grad)" 
          stroke-width="7" 
          stroke-linecap="round" />
  </g>

  <!-- Sparkle Star at Top Right -->
  <!-- Position around (82, 18) -->
  <!-- Glow background -->
  <circle cx="82" cy="18" r="12" fill="url(#star-glow)" />
  <!-- Sparkle shape -->
  <path d="M 82,6 L 84,16 L 94,18 L 84,20 L 82,30 L 80,20 L 70,18 L 80,16 Z" 
        fill="#ffffff" />
  <path d="M 82,10 L 83,17 L 90,18 L 83,19 L 82,26 L 81,19 L 74,18 L 81,17 Z" 
        fill="#06b6d4" opacity="0.6" />
</svg>
