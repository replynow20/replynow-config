<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <linearGradient id="gradA" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6527BE"/>
      <stop offset="50%" stop-color="#45CEE0"/>
      <stop offset="100%" stop-color="#00D0F5"/>
    </linearGradient>

    <linearGradient id="gradSwoosh" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#5E239D"/>
      <stop offset="60%" stop-color="#45CEE0"/>
      <stop offset="100%" stop-color="#00F0FF"/>
    </linearGradient>

    <linearGradient id="gradI" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00D0F5"/>
      <stop offset="60%" stop-color="#6527BE"/>
      <stop offset="100%" stop-color="#3A0CA3"/>
    </linearGradient>

    <radialGradient id="gradStar" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="30%" stop-color="#E0FFFF"/>
      <stop offset="100%" stop-color="#45CEE0"/>
    </radialGradient>

    <filter id="starGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="12" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="500" height="500" fill="transparent"/>

  <path d="M 70 270 Q 70 400 220 290 T 400 150" 
        fill="none" 
        stroke="url(#gradSwoosh)" 
        stroke-width="32" 
        stroke-linecap="round"/>

  <path d="M 120 400 Q 180 150 260 110 Q 280 250 300 400" 
        fill="none" 
        stroke="url(#gradA)" 
        stroke-width="44" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>

  <path d="M 370 200 Q 310 400 410 370" 
        fill="none" 
        stroke="url(#gradI)" 
        stroke-width="40" 
        stroke-linecap="round"/>

  <path d="M 425 50 L 433 82 L 465 90 L 433 98 L 425 130 L 417 98 L 385 90 L 417 82 Z" 
        fill="url(#gradStar)" 
        filter="url(#starGlow)"/>
        
</svg>
